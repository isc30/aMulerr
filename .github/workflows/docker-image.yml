name: Docker Image CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: benjlevesque/short-sha@v3.0

      - name: Set imgver tag
        id: imgver
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SAFE_BRANCH_NAME="$(echo "${{ github.head_ref }}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
            echo "IMG_VER=feat_${SAFE_BRANCH_NAME}" >> $GITHUB_ENV
          else
            echo "IMG_VER=$(date +'%Y-%m-%d')_${{ env.SHA }}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: isc30/amulerr
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ env.IMG_VER }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/amulerr
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            IMG_VER=${{ env.IMG_VER }}
